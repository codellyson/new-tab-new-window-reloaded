<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="optionsTestTitle"></title>
  <style>
body {
    margin: 0;
    background: #eef0f6;
    color: #1f2430;
    line-height: 1.5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, Meiryo, sans-serif;
}
.card {
    max-width: 32em;
    margin: 3em auto;
    padding: 2em;
    background: #fff;
    border: 1px solid #e6e8ef;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(31, 36, 48, 0.08);
    text-align: center;
}
button {
    font: inherit;
    font-weight: 600;
    color: #4f5b8c;
    background: #fff;
    border: 1px solid #4f5b8c;
    border-radius: 9px;
    padding: 0.5em 1.3em;
    margin-top: 1em;
    cursor: pointer;
}
button:hover { background: #4f5b8c; color: #fff; }
  </style>
</head>
<body>
  <div class="card">
    <div data-i18n="optionsTestMessage"></div>
    <button id="closeBtn" data-i18n="optionsTestCloseButton"></button>
  </div>
  <script src="options_test.js"></script>
</body>
</html>
