<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="optionsTitle"></title>
  <style>
:root {
    --bg: #eef0f6;
    --card: #ffffff;
    --ink: #1f2430;
    --muted: #6b7280;
    --line: #e6e8ef;
    --brand: #4f5b8c;
    --brand-ink: #3a4470;
    --accent: #f5a623;
    --radius: 14px;
}
* { box-sizing: border-box; }
body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, Meiryo, sans-serif;
    font-size: 14px;
}
.wrap {
    max-width: 560px;
    margin: 2.5em auto;
    padding: 0 1em;
}
.card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: 0 10px 30px rgba(31, 36, 48, 0.08);
    overflow: hidden;
}
.head {
    display: flex;
    align-items: center;
    gap: 0.85em;
    padding: 1.4em 1.6em;
    background: linear-gradient(135deg, #4f5b8c 0%, #3a4470 100%);
    color: #fff;
}
.head img { width: 44px; height: 44px; border-radius: 10px; display: block; }
.head h1 { margin: 0; font-size: 1.15em; font-weight: 600; letter-spacing: 0.2px; }
.body { padding: 0.5em 1.6em 1.6em; }

.setting {
    padding: 1.25em 0;
    border-bottom: 1px solid var(--line);
}
.setting:last-of-type { border-bottom: 0; }
.setting > .label {
    font-weight: 600;
    margin-bottom: 0.55em;
}
.opt {
    display: flex;
    align-items: flex-start;
    gap: 0.55em;
    padding: 0.2em 0;
    cursor: pointer;
}
.opt input { margin: 0.25em 0 0 0; cursor: pointer; }
.opt span { cursor: pointer; }

.sizebox {
    display: flex;
    align-items: center;
    gap: 0.5em;
    margin: 0.5em 0 0 1.7em;
}
input[type=number] {
    width: 5.5em;
    padding: 0.4em 0.55em;
    border: 1px solid var(--line);
    border-radius: 8px;
    font: inherit;
}
input[type=number]:focus, textarea:focus {
    outline: none;
    border-color: var(--brand);
    box-shadow: 0 0 0 3px rgba(79, 91, 140, 0.15);
}
textarea {
    width: 100%;
    margin-top: 0.5em;
    padding: 0.6em 0.7em;
    border: 1px solid var(--line);
    border-radius: 10px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.92em;
    resize: vertical;
}
.hint { font-size: 0.86em; color: var(--muted); margin-top: 0.45em; }
.foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1em;
    padding-top: 1.3em;
}
.saved { font-size: 0.86em; color: #2f9e44; opacity: 0; transition: opacity 0.2s; }
.saved.show { opacity: 1; }
button {
    font: inherit;
    font-weight: 600;
    color: var(--brand);
    background: #fff;
    border: 1px solid var(--brand);
    border-radius: 9px;
    padding: 0.5em 1.1em;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
}
button:hover { background: var(--brand); color: #fff; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="head">
        <img src="img/icon128.png" alt="" />
        <h1 data-i18n="optionsTitle"></h1>
      </div>
      <form class="body">

        <div class="setting">
          <div class="label" data-i18n="optionsNewWindowPosition"></div>
          <label class="opt"><input type="radio" name="newWindowsPosition" value="0" id="newWindowsPositionDefault" /><span data-i18n="optionsNewWindowPositionDefaultLabel"></span></label>
          <label class="opt"><input type="radio" name="newWindowsPosition" value="1" id="newWindowsPositionParent" /><span data-i18n="optionsNewWindowPositionParentLabel"></span></label>
          <label class="opt"><input type="radio" name="newWindowsPosition" value="2" id="newWindowsPositionMaximize" /><span data-i18n="optionsNewWindowPositionMaximizeLabel"></span></label>
        </div>

        <div class="setting">
          <div class="label" data-i18n="optionsWindowSize"></div>
          <label class="opt"><input type="radio" name="windowSizeMode" value="0" id="windowSizeInherit" /><span data-i18n="optionsWindowSizeInheritLabel"></span></label>
          <label class="opt"><input type="radio" name="windowSizeMode" value="1" id="windowSizeCustom" /><span data-i18n="optionsWindowSizeCustomLabel"></span></label>
          <div class="sizebox">
            <input type="number" id="windowWidth" min="100" step="1" />
            <span>&times;</span>
            <input type="number" id="windowHeight" min="100" step="1" />
            <span data-i18n="optionsWindowSizePixels"></span>
          </div>
          <div class="hint" data-i18n="optionsWindowSizeHint"></div>
        </div>

        <div class="setting">
          <div class="label" data-i18n="optionsBehavior"></div>
          <label class="opt"><input type="checkbox" id="focusNewWindow" /><span data-i18n="optionsFocusNewWindow"></span></label>
          <label class="opt"><input type="checkbox" id="triggerLinkOnly" /><span data-i18n="optionsTriggerLinkOnly"></span></label>
          <label class="opt"><input type="checkbox" id="keepExternalAsTab" /><span data-i18n="optionsKeepExternalAsTab"></span></label>
          <label class="opt"><input type="checkbox" id="excludePinned" /><span data-i18n="optionsExcludePinned"></span></label>
        </div>

        <div class="setting">
          <div class="label" data-i18n="optionsMinTabs"></div>
          <input type="number" id="minTabsThreshold" min="0" step="1" />
          <div class="hint" data-i18n="optionsMinTabsHint"></div>
        </div>

        <div class="setting">
          <div class="label" data-i18n="optionsExcludeUrls"></div>
          <textarea id="excludeUrls" rows="5"></textarea>
          <div class="hint" data-i18n="optionsExcludeUrlsHint"></div>
        </div>

        <div class="foot">
          <button id="testBtn" data-i18n="optionsTestButton"></button>
          <span id="savedIndicator" class="saved" data-i18n="optionsSaved"></span>
        </div>

      </form>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
